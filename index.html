body {
  min-height: 100vh;
  min-height: -webkit-fill-available;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  font-family: 'PingFang TC', 'Noto Sans TC', -apple-system, sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

#app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Header ── */
.header {
  padding: max(env(safe-area-inset-top), 52px) 20px 0;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.app-title { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
.app-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }

select {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  color: #fff;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
  font-family: inherit;
}

/* ── Balance Card ── */
.balance-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 20px 24px;
  margin: 16px 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.asset-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.asset-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.asset-amount { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
.asset-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; }
.divider { height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 12px; }
.month-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
.stats-row { display: flex; gap: 24px; }
.stat-label { font-size: 11px; color: rgba(255,255,255,0.4); }
.stat-val { font-size: 16px; font-weight: 700; }
.vline { width: 1px; background: rgba(255,255,255,0.15); }

/* savings button */
.savings-btn {
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  font-family: inherit;
}

/* ── Category pills ── */
.cat-pills { margin-bottom: 16px; }
.cat-pills-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
.pills-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Tabs ── */
.tab-nav {
  display: flex;
  gap: 8px;
  padding: 0 20px;
  margin-bottom: 16px;
}

.tab-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.2s;
  color: #fff;
  font-family: inherit;
}

.tab-btn.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  box-shadow: 0 4px 15px rgba(102,126,234,0.4);
}

.tab-btn.inactive { background: rgba(255,255,255,0.08); }

/* ── Content ── */
.content {
  flex: 1;
  padding: 0 20px 24px;
  overflow-y: auto;
}

/* ── Records ── */
.records { display: flex; flex-direction: column; gap: 10px; }

.record-item {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.cat-icon-box {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.record-info { flex: 1; min-width: 0; }
.record-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
.type-badge { font-size: 10px; border-radius: 6px; padding: 1px 6px; }
.record-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.record-right { text-align: right; flex-shrink: 0; }
.record-amount { font-size: 17px; font-weight: 800; }
.del-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  font-size: 11px;
  padding: 0;
  margin-top: 2px;
  font-family: inherit;
}

.empty {
  text-align: center;
  color: rgba(255,255,255,0.3);
  padding: 60px 0;
  font-size: 14px;
  line-height: 2;
}

/* ── Add Form ── */
.add-form { display: flex; flex-direction: column; gap: 16px; }

.type-toggle {
  display: flex;
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 4px;
  gap: 4px;
}

.type-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s;
  font-family: inherit;
}

.field-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }

.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.cat-btn {
  border-radius: 14px;
  padding: 12px 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all 0.15s;
  font-family: inherit;
}

.cat-btn .cat-emoji { font-size: 22px; }
.cat-btn .cat-name { font-size: 11px; font-weight: 600; }

.amount-box {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 0 16px;
}

.amount-sign { color: rgba(255,255,255,0.4); font-size: 18px; margin-right: 8px; }

input[type="number"], input[type="text"], input[type="date"] {
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-family: inherit;
}

.amount-input { flex: 1; font-size: 24px; font-weight: 800; padding: 14px 0; width: 100%; }
.amount-unit { color: rgba(255,255,255,0.3); font-size: 14px; }

.text-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
}

.date-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 14px;
  color-scheme: dark;
}

.submit-btn {
  width: 100%;
  padding: 16px 0;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 1px;
  transition: all 0.2s;
  cursor: pointer;
  font-family: inherit;
}

.submit-btn.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  box-shadow: 0 6px 20px rgba(102,126,234,0.5);
}

.submit-btn.disabled {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.3);
  cursor: not-allowed;
}

/* ── Savings Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-overlay.open { display: flex; }

.modal-box {
  background: linear-gradient(135deg, #1e1b4b, #2d2a6e);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 20px; line-height: 1.6; }

.modal-input-row {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  padding: 0 16px;
  margin-bottom: 20px;
}

.modal-btns { display: flex; gap: 10px; }

.modal-cancel {
  flex: 1; padding: 13px 0; border-radius: 12px; border: none;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
}

.modal-confirm {
  flex: 2; padding: 13px 0; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 15px rgba(102,126,234,0.4); font-family: inherit;
}

<script>
  // ── Data ──
  const EXPENSE_CATS = [
    { id:'food',         label:'餐飲', icon:'🍜', color:'#FF6B6B' },
    { id:'transport',    label:'交通', icon:'🚇', color:'#4ECDC4' },
    { id:'tw_stock_buy', label:'買台股',icon:'📈', color:'#45B7D1' },
    { id:'us_stock_buy', label:'買美股',icon:'💹', color:'#96CEB4' },
    { id:'travel',       label:'旅遊', icon:'✈️', color:'#FFEAA7' },
    { id:'shopping',     label:'購物', icon:'🛍️', color:'#DDA0DD' },
    { id:'entertainment',label:'娛樂', icon:'🎮', color:'#F0A500' },
    { id:'medical',      label:'醫療', icon:'🏥', color:'#98D8C8' },
    { id:'other_exp',    label:'其他', icon:'📦', color:'#B0B0B0' },
  ];

  const INCOME_CATS = [
    { id:'salary',        label:'薪資', icon:'💼', color:'#6BCB77' },
    { id:'tw_stock_sell', label:'賣台股',icon:'📉', color:'#4D96FF' },
    { id:'us_stock_sell', label:'賣美股',icon:'💲', color:'#FFD93D' },
    { id:'other_inc',     label:'其他', icon:'💰', color:'#C77DFF' },
  ];

  // ── State (persisted in localStorage) ──
  function load(key, def) {
    try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; }
    catch(e) { return def; }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }

  let records = load('records', [
    { id:1, type:'income',  category:'salary',       amount:55000, note:'四月薪資',       date:'2026-04-01' },
    { id:2, type:'expense', category:'food',          amount:320,   note:'午餐便當',       date:'2026-04-02' },
    { id:3, type:'expense', category:'transport',     amount:50,    note:'捷運',           date:'2026-04-03' },
    { id:4, type:'expense', category:'tw_stock_buy',  amount:10000, note:'台積電',         date:'2026-04-03' },
    { id:5, type:'income',  category:'us_stock_sell', amount:8500,  note:'NVIDIA獲利了結', date:'2026-04-04' },
  ]);
  let initialSavings = load('initialSavings', 0);
  let filterMonth    = load('filterMonth', new Date().toISOString().slice(0,7));
  let currentTab     = 'list';
  let currentType    = 'expense';
  let selectedCat    = '';

  // ── Helpers ──
  function fmt(n) { return Number(n).toLocaleString('zh-TW'); }
  function fmtDate(s) { const d=new Date(s); return `${d.getMonth()+1}/${d.getDate()}`; }
  function getCat(type, id) {
    const list = type==='expense' ? EXPENSE_CATS : INCOME_CATS;
    return list.find(c=>c.id===id) || { label:id, icon:'❓', color:'#ccc' };
  }

  // ── Month selector ──
  function buildMonthSelect() {
    const months = [...new Set(records.map(r=>r.date.slice(0,7)))];
    const cur = new Date().toISOString().slice(0,7);
    if (!months.includes(cur)) months.push(cur);
    months.sort().reverse();
    if (!months.includes(filterMonth)) filterMonth = months[0];
    const sel = document.getElementById('monthSelect');
    sel.innerHTML = months.map(m=>`<option value="${m}"${m===filterMonth?' selected':''}>${m}</option>`).join('');
  }

  function onMonthChange() {
    filterMonth = document.getElementById('monthSelect').value;
    save('filterMonth', filterMonth);
    render();
  }

  // ── Compute ──
  function compute() {
    const filtered = records
      .filter(r=>r.date.startsWith(filterMonth))
      .sort((a,b)=>new Date(b.date)-new Date(a.date));
    const inc = filtered.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp = filtered.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const allInc = records.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
    const allExp = records.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    return { filtered, inc, exp, bal: inc-exp, totalAssets: initialSavings+allInc-allExp };
  }

  // ── Render header ──
  function renderHeader({ inc, exp, bal, totalAssets }) {
    const ta = document.getElementById('totalAssetsEl');
    ta.style.color = totalAssets >= 0 ? '#FFD93D' : '#FF6B6B';
    ta.innerHTML = `${fmt(totalAssets)} <span style="font-size:14px;font-weight:400">元</span>`;

    const sub = document.getElementById('savingsSubEl');
    if (initialSavings > 0) {
      sub.style.display = 'block';
      sub.textContent = `含初始存款 ${fmt(initialSavings)} 元`;
    } else {
      sub.style.display = 'none';
    }

    const btn = document.getElementById('savingsBtn');
    if (initialSavings > 0) {
      btn.style.background = 'rgba(255,217,61,0.15)';
      btn.style.border = '1px solid rgba(255,217,61,0.4)';
      btn.style.color = '#FFD93D';
      btn.textContent = '🏦 修改存款';
    } else {
      btn.style.background = 'rgba(255,255,255,0.08)';
      btn.style.border = '1px solid rgba(255,255,255,0.15)';
      btn.style.color = 'rgba(255,255,255,0.5)';
      btn.textContent = '🏦 設定存款';
    }

    document.getElementById('incomeEl').textContent = '+' + fmt(inc);
    document.getElementById('expenseEl').textContent = '-' + fmt(exp);
    const balEl = document.getElementById('balanceEl');
    balEl.textContent = (bal>=0?'+':'') + fmt(bal);
    balEl.style.color = bal>=0 ? '#6BCB77' : '#FF6B6B';
  }

  // ── Render pills ──
  function renderPills(filtered) {
    const map = {};
    filtered.filter(r=>r.type==='expense').forEach(r=>{
      map[r.category] = (map[r.category]||0) + r.amount;
    });
    const cats = Object.entries(map)
      .map(([id,amt])=>({...getCat('expense',id), amt}))
      .sort((a,b)=>b.amt-a.amt).slice(0,5);

    const sec = document.getElementById('pillsSection');
    const row = document.getElementById('pillsRow');
    if (cats.length === 0) { sec.style.display='none'; return; }
    sec.style.display = 'block';
    row.innerHTML = cats.map(c=>`
      <div class="pill" style="background:${c.color}22;border:1px solid ${c.color}55">
        <span>${c.icon}</span>
        <span style="color:${c.color}">${c.label}</span>
        <span style="color:rgba(255,255,255,0.6);font-size:11px">${fmt(c.amt)}</span>
      </div>
    `).join('');
  }

  // ── Render records ──
  function renderList(filtered) {
    const el = document.getElementById('recordsList');
    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty">本月尚無記錄<br>點擊「+ 新增」開始記帳</div>`;
      return;
    }
    el.innerHTML = filtered.map(r => {
      const cat = getCat(r.type, r.category);
      const amtColor = r.type==='income' ? '#6BCB77' : '#FF6B6B';
      const badgeBg  = r.type==='income' ? '#6BCB7733' : '#FF6B6B33';
      const prefix   = r.type==='income' ? '+' : '-';
      return `
        <div class="record-item">
          <div class="cat-icon-box" style="background:${cat.color}22;border:1px solid ${cat.color}44">${cat.icon}</div>
          <div class="record-info">
            <div class="record-title">
              ${cat.label}
              <span class="type-badge" style="background:${badgeBg};color:${amtColor}">${r.type==='income'?'收入':'支出'}</span>
            </div>
            <div class="record-sub">${r.note||'—'} · ${fmtDate(r.date)}</div>
          </div>
          <div class="record-right">
            <div class="record-amount" style="color:${amtColor}">${prefix}${fmt(r.amount)}</div>
            <button class="del-btn" onclick="deleteRecord(${r.id})">刪除</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Render category grid ──
  function renderCatGrid() {
    const cats = currentType==='expense' ? EXPENSE_CATS : INCOME_CATS;
    const grid = document.getElementById('catGrid');
    grid.innerHTML = cats.map(c => {
      const sel = selectedCat===c.id;
      return `
        <button class="cat-btn" onclick="selectCat('${c.id}')"
          style="background:${sel?c.color+'33':'rgba(255,255,255,0.06)'};border:1.5px solid ${sel?c.color:'rgba(255,255,255,0.1)'}">
          <span class="cat-emoji">${c.icon}</span>
          <span class="cat-name" style="color:${sel?c.color:'rgba(255,255,255,0.6)'}">${c.label}</span>
        </button>
      `;
    }).join('');
  }

  // ── Full render ──
  function render() {
    buildMonthSelect();
    const { filtered, inc, exp, bal, totalAssets } = compute();
    renderHeader({ inc, exp, bal, totalAssets });
    renderPills(filtered);
    renderList(filtered);
    renderCatGrid();
    updateSubmitBtn();
  }

  // ── Tab ──
  function setTab(tab) {
    currentTab = tab;
    document.getElementById('listView').style.display = tab==='list' ? 'block' : 'none';
    document.getElementById('addView').style.display  = tab==='add'  ? 'block' : 'none';
    document.getElementById('tabList').className = 'tab-btn ' + (tab==='list'?'active':'inactive');
    document.getElementById('tabAdd').className  = 'tab-btn ' + (tab==='add' ?'active':'inactive');
    if (tab==='add') renderCatGrid();
  }

  // ── Type ──
  function setType(t) {
    currentType = t;
    selectedCat = '';
    const eBtn = document.getElementById('btnExpense');
    const iBtn = document.getElementById('btnIncome');
    if (t==='expense') {
      eBtn.style.cssText = 'background:rgba(255,107,107,0.2);color:#FF6B6B;border-bottom:2px solid #FF6B6B;flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;transition:all 0.2s;font-family:inherit;border-bottom:2px solid #FF6B6B';
      iBtn.style.cssText = 'background:transparent;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;transition:all 0.2s;font-family:inherit;border-bottom:2px solid transparent';
    } else {
      iBtn.style.cssText = 'background:rgba(107,203,119,0.2);color:#6BCB77;border-bottom:2px solid #6BCB77;flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;transition:all 0.2s;font-family:inherit;border-bottom:2px solid #6BCB77';
      eBtn.style.cssText = 'background:transparent;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;flex:1;padding:10px 0;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:15px;transition:all 0.2s;font-family:inherit;border-bottom:2px solid transparent';
    }
    renderCatGrid();
    updateSubmitBtn();
  }

  // ── Category select ──
  function selectCat(id) {
    selectedCat = id;
    renderCatGrid();
    updateSubmitBtn();
  }

  // ── Submit button state ──
  function updateSubmitBtn() {
    const amt = parseFloat(document.getElementById('amountInput').value);
    const ok = selectedCat && !isNaN(amt) && amt > 0;
    const btn = document.getElementById('submitBtn');
    btn.className = 'submit-btn ' + (ok ? 'active' : 'disabled');
  }

  // ── Add record ──
  function handleAdd() {
    const amt = parseFloat(document.getElementById('amountInput').value);
    if (!selectedCat || isNaN(amt) || amt <= 0) return;
    const dateVal = document.getElementById('dateInput').value || new Date().toISOString().split('T')[0];
    const rec = {
      id: Date.now(),
      type: currentType,
      category: selectedCat,
      amount: amt,
      note: document.getElementById('noteInput').value.trim(),
      date: dateVal,
    };
    records.push(rec);
    save('records', records);

    // reset form
    document.getElementById('amountInput').value = '';
    document.getElementById('noteInput').value = '';
    selectedCat = '';

    // update month if needed
    const recMonth = dateVal.slice(0,7);
    filterMonth = recMonth;
    save('filterMonth', filterMonth);

    render();
    setTab('list');
  }

  // ── Delete ──
  function deleteRecord(id) {
    records = records.filter(r=>r.id!==id);
    save('records', records);
    render();
  }

  // ── Savings Modal ──
  function openSavingsModal() {
    document.getElementById('savingsInput').value = initialSavings > 0 ? initialSavings : '';
    document.getElementById('savingsModal').classList.add('open');
  }

  function closeSavingsModal() {
    document.getElementById('savingsModal').classList.remove('open');
  }

  function confirmSavings() {
    const v = parseFloat(document.getElementById('savingsInput').value);
    if (!isNaN(v) && v >= 0) {
      initialSavings = v;
      save('initialSavings', initialSavings);
    }
    closeSavingsModal();
    render();
  }

  // ── Init ──
  document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
  render();
</script>

</body>
</html>
